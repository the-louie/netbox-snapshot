# Pre-commit hooks for nbsnap.
#
# Mirrors the CI lint job so failures surface at `git commit` rather
# than after a round-trip through GitHub. Mypy is deliberately out of
# this hook set, it is too slow for an interactive commit; CI catches
# anything pre-commit misses.
#
# Install with:
#     pip install pre-commit
#     pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # `--fix` lets the hook auto-correct simple issues before
      # the commit lands, so the developer is not bounced for a
      # missing trailing comma.
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
