# NetBox test instance, "destination" side of the round-trip pair.
#
# Mirrors source/docker-compose.yml with two shifts:
#   * Host port 8081 (source uses 8080).
#   * Volume names end in -dest (source ends in -source).
# Both shifts let the two stacks run side by side under different
# project names.

services:
  netbox:
    image: netboxcommunity/netbox:${NETBOX_DOCKER_TAG:-v4.6.3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    env_file:
      - env/netbox.env
    ports:
      - "8081:8080"
    healthcheck:
      # `/login/` is open without authentication on every NetBox
      # version we target; `/api/status/` requires a token on 4.6
      # and would otherwise leave the compose health probe stuck
      # at HTTP 403 forever.
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8080/login/"]
      # `start_period` gives migrations and superuser creation room
      # to finish before failing probes count against `retries`.
      # 60s plus 30 retries at 10s interval gives a 360s ceiling,
      # which matches the cold start time observed on GH runners.
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    volumes:
      - netbox-postgres-data-dest:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass netbox
    volumes:
      - netbox-redis-data-dest:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "netbox", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis-cache:
    image: redis:7-alpine
    command: redis-server --requirepass netbox
    volumes:
      - netbox-redis-cache-data-dest:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "netbox", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  netbox-postgres-data-dest:
  netbox-redis-data-dest:
  netbox-redis-cache-data-dest:
